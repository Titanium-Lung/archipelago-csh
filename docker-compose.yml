services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
      - "38281-38301:38281-38301"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
  
  frontend:
    build: 
      context: ./frontend
      target: build
    command: npm run dev -- --host
    ports: 
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend